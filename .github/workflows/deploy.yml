name: Build Ignis & Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Update submodules to latest version
        run: bash scripts/update.sh

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Build Ignis CLI
        run: |
          cd ignis
          go build -o ../ignis-cli ./pkg/cmd

      - name: Generate site
        run: |
          ./ignis-cli \
            --index=ignis/templates/index.html \
            --repo=ignis/templates/repository.html

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: build